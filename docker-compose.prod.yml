services:
  database:
    image: mysql:8.4
    container_name: traccar-mysql-prod
    restart: always
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - traccar_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
    networks:
      - traccar-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  traccar:
    image: traccar/traccar:latest
    container_name: traccar-server-prod
    restart: always
    depends_on:
      database:
        condition: service_healthy
    environment:
      CONFIG_USE_ENVIRONMENT_VARIABLES: "true"
      DATABASE_DRIVER: com.mysql.cj.jdbc.Driver
      DATABASE_URL: >-
        jdbc:mysql://database:3306/${MYSQL_DATABASE}
        ?zeroDateTimeBehavior=round
        &serverTimezone=UTC
        &allowPublicKeyRetrieval=true
        &useSSL=false
        &allowMultiQueries=true
        &autoReconnect=true
        &useUnicode=yes
        &characterEncoding=UTF-8
        &sessionVariables=sql_mode=''
      DATABASE_USER: ${MYSQL_USER}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      WEB_ENABLE: "true"
      WEB_PORT: 8082
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/api/health"]
      interval: 2m
      timeout: 10s
      start_period: 2m
      retries: 3
    ports:
      - "8082:8082"  # Web interface
      # - "5010-5060:5010-5060"  
      - "5100-5150:5100-5150"  # GPS tracking ports
    volumes:
      - traccar_logs:/opt/traccar/logs
      - traccar_conf:/opt/traccar/conf
    networks:
      - traccar-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Optional: Nginx reverse proxy for SSL termination
  nginx:
    image: nginx:alpine
    container_name: traccar-nginx
    restart: always
    depends_on:
      - traccar
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - traccar_logs:/var/log/nginx
    networks:
      - traccar-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

volumes:
  traccar_data:
    driver: local
  traccar_logs:
    driver: local
  traccar_conf:
    driver: local

networks:
  traccar-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
